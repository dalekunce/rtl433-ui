---
# HA builder reads this to select the correct base image per architecture.
# ghcr.io/home-assistant/{arch}-base-debian ships Debian Bookworm (12).
build_from:
  amd64:   ghcr.io/home-assistant/amd64-base-debian:bookworm
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  armv7:   ghcr.io/home-assistant/armv7-base-debian:bookworm

labels:
  io.hass.name:        "RTL433-UI"
  io.hass.description: "Web dashboard and MQTT mapper for RTL-SDR receivers"
  io.hass.type:        "addon"
  io.hass.version:     "1.1.0"
