---
name: RTL433-UI
version: "0.1.6"
slug: rtl433-ui
description: "Live dashboard for RTL-SDR dongles. Decodes 433/315/868/915 MHz devices (weather stations, door sensors, utility meters) and maps any field to MQTT with one click. Includes HA auto-discovery, a persistent band scanner, and a bundled rtl_433 binary — no extra add-on needed."
url: "https://github.com/dalekunce/rtl433-ui"
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto

# ── Web UI access ─────────────────────────────────────────────────────────────
# Ingress: UI accessible from the HA sidebar without opening an extra port.
ingress: true
ingress_port: 3000
panel_icon: mdi:radio-tower
panel_title: RTL433-UI

# Direct port access (optional — useful for external tools or local dev)
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web UI (also available via HA sidebar via ingress)"

# ── Hardware access ───────────────────────────────────────────────────────────
# Pass through all connected USB devices so the container can see RTL-SDR dongles.
usb: true

# ── User-configurable options ─────────────────────────────────────────────────
options:
  mqtt_url: "mqtt://core-mosquitto:1883"
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "rtl_433"
  mqtt_command_topic: "rtl_433/command"

schema:
  mqtt_url: str
  mqtt_username: str
  mqtt_password: str
  mqtt_topic_prefix: str
  mqtt_command_topic: str

