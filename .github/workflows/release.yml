name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

# Serialize: never run two release jobs in parallel.
# If commits pile up, each queued run checks out the latest HEAD (see ref: main below)
# so it always reads the already-bumped version and increments from there.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if this IS a version-bump commit (prevents infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main        # always checkout latest HEAD, not just the triggering SHA
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: current
        run: |
          VERSION=$(node -p "require('./rtl433-ui/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          OLD="${{ steps.current.outputs.version }}"
          MAJOR=$(echo "$OLD" | cut -d. -f1)
          MINOR=$(echo "$OLD" | cut -d. -f2)
          PATCH=$(echo "$OLD" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

          # Guard: skip if this version tag already exists (idempotent safety)
          if git ls-remote --tags origin "refs/tags/v$NEW" | grep -q .; then
            echo "Tag v$NEW already exists — nothing to do"
            echo "already_released=true" >> $GITHUB_ENV
            exit 0
          fi

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('rtl433-ui/package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('rtl433-ui/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update config.yaml
          sed -i "s/^version: \"$OLD\"/version: \"$NEW\"/" rtl433-ui/config.yaml

      - name: Commit version bump
        if: env.already_released != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rtl433-ui/package.json rtl433-ui/config.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create GitHub Release
        if: env.already_released != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
          make_latest: true
          # build.yml triggers automatically on release:published — no dispatch needed
