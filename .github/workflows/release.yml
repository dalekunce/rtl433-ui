name: Auto Release

on:
  push:
    branches: [main]
    # Don't trigger on version-bump commits to prevent loops
    paths-ignore:
      - '.github/**'

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the commit message is the version bump itself
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: current
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          OLD="${{ steps.current.outputs.version }}"
          MAJOR=$(echo "$OLD" | cut -d. -f1)
          MINOR=$(echo "$OLD" | cut -d. -f2)
          PATCH=$(echo "$OLD" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update config.yaml
          sed -i "s/^version: \"$OLD\"/version: \"$NEW\"/" config.yaml

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json config.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
          make_latest: true
